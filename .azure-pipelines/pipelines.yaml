# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
- group: ImageTags

resources:
  repositories:
    - repository: templates
      type: git
      name: "NCBA DevOps/pipeline-templates"
      ref: main
extends:
  template: integrator/template-retail-innovation-hub.yaml@templates
  parameters:
    imageTag: $(Dcl_deferral_frontend)
    imageRepository: 'Dcl_deferral_frontend'
    azureSubscription: 'ncbadevtestarmsc'
    containerRegistry: 'RETAIL-INNOVATION'
    # libraryVariable: 'Dcl_deferral_b'
    projectName: 'RETAIL INNOVATION HUB'

    
